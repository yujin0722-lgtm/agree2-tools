<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGREE II 評価ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --main-color: #2c5f8a;
    --accent-color: #e07a1f;
    --bg-color: #f5f7fa;
    --border-color: #d8dee5;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: var(--bg-color);
    margin: 0;
    padding: 0;
    color: #222;
  }
  header {
    background: var(--main-color);
    color: white;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  header h1 { margin: 0; font-size: 1.3em; }
  header p { margin: 4px 0 0; font-size: 0.9em; opacity: 0.9; }
  .header-actions button {
    font-size: 0.95em;
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    background: var(--accent-color);
    color: white;
  }
  .header-actions button:disabled { opacity: 0.6; cursor: not-allowed; }

  .container { max-width: 900px; margin: 0 auto; padding: 16px; }

  .panel {
    background: white;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .panel h2 { margin-top: 0; font-size: 1.05em; color: var(--main-color); }

  table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
  th, td { border: 1px solid var(--border-color); padding: 6px 8px; text-align: center; }
  th { background: #eef4fa; }
  td.group-col, th.group-col { text-align: left; }

  #loadingMsg { padding: 30px; text-align: center; color: #666; }
  #errorMsg { padding: 16px; color: #a00; display: none; }

  .status-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.78em;
  }
  .status-confirmed { background: #e2f5e9; color: #1f7a3d; }
  .status-draft { background: #fff3e0; color: #a05a00; }
  .status-missing { background: #fdeaea; color: #c0392b; }
  .status-ok { color: #999; }

  canvas { max-width: 100%; }

  .accordion-item {
    border: 1px solid var(--border-color);
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .accordion-header {
    width: 100%;
    text-align: left;
    background: #f8fafc;
    border: none;
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9em;
    font-family: inherit;
  }
  .accordion-header .num { color: var(--main-color); font-weight: bold; margin-right: 8px; }
  .accordion-header .meta { font-size: 0.8em; color: #888; font-weight: normal; }
  .accordion-arrow { transition: transform 0.15s; }
  .accordion-item.open .accordion-arrow { transform: rotate(180deg); }
  .accordion-body { display: none; padding: 12px 14px; border-top: 1px solid var(--border-color); }
  .accordion-item.open .accordion-body { display: block; }

  .comment-row { padding: 8px 0; border-bottom: 1px solid #eee; }
  .comment-row:last-child { border-bottom: none; }
  .comment-row .who { font-size: 0.82em; color: #555; margin-bottom: 3px; }
  .comment-row .who .score-badge {
    display: inline-block; background: var(--main-color); color: white;
    border-radius: 10px; padding: 1px 8px; font-size: 0.85em; margin-right: 6px;
  }
  .comment-row p { margin: 0; font-size: 0.9em; white-space: pre-line; }
  .no-comment { font-size: 0.85em; color: #999; padding: 6px 0; }

  .toolbar-right { text-align: right; margin-bottom: 8px; }
  .toolbar-right button {
    background: white; border: 1.5px solid var(--main-color); color: var(--main-color);
    padding: 5px 12px; border-radius: 6px; font-size: 0.82em; cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>AGREE II 評価ダッシュボード</h1>
    <p id="guidelineLine">読み込み中...</p>
  </div>
  <div class="header-actions">
    <button id="reloadBtn">再読み込み</button>
    <button id="pdfBtn">PDFで保存</button>
  </div>
</header>

<div class="container">
  <div id="loadingMsg">データを読み込んでいます...</div>
  <div id="errorMsg"></div>

  <div id="pdfArea" style="display:none;">
    <div class="panel">
      <h2>班ごとの全体評価</h2>
      <table id="overallTable">
        <thead>
          <tr><th class="group-col">班</th><th>ステータス</th><th>全体的な質(1〜7)</th><th>使用の推奨</th><th>未回答の項目</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="panel">
      <h2>ドメイン別スコア(%)</h2>
      <canvas id="domainChart" height="320"></canvas>
    </div>

    <div class="panel">
      <h2>ドメイン別スコア 詳細表</h2>
      <table id="domainTable">
        <thead><tr id="domainTableHead"></tr></thead>
        <tbody id="domainTableBody"></tbody>
      </table>
      <p style="font-size:0.8em;color:#666;">スコアは「確定」ステータスの班のみを対象に、AGREE II使用の手引きに準拠した計算式((獲得評点−最低評点)/(最高評点−最低評点)×100)で算出しています。</p>
    </div>

    <div class="panel">
      <h2>項目ごとのコメント</h2>
      <div class="toolbar-right">
        <button id="expandAllBtn">すべて開く</button>
        <button id="collapseAllBtn">すべて閉じる</button>
      </div>
      <div id="commentsContainer"></div>
    </div>
  </div>
</div>

<script>
// ==== 設定: デプロイ後、あなたのGAS Web AプリのURLに書き換えてください ====
var API_URL = "https://script.google.com/macros/s/AKfycbyaKp-ytpBpi_LH2-t7tfJDAvouv8wEyMVfTp1rI8wxCcttJzr_tJWSBjcXfilCnx2vfg/exec";

var DOMAIN_DEFS = [
  { name: "領域1 対象と目的", items: [1, 2, 3] },
  { name: "領域2 利害関係者の参加", items: [4, 5, 6] },
  { name: "領域3 作成の厳密さ", items: [7, 8, 9, 10, 11, 12, 13, 14] },
  { name: "領域4 提示の明確さ", items: [15, 16, 17] },
  { name: "領域5 適用可能性", items: [18, 19, 20, 21] },
  { name: "領域6 編集の独立性", items: [22, 23] }
];

// コメント一覧表示のための項目本文(Minds AGREEⅡ日本語訳 2022年9月改訂 準拠)
var ITEM_TEXTS = {
  1: "ガイドライン全体の目的が具体的に記載されている。",
  2: "ガイドラインが取り扱う健康上の問題が具体的に記載されている。",
  3: "ガイドラインの適用が想定される対象集団(患者、一般市民など)が具体的に記載されている。",
  4: "ガイドライン作成グループには、関係する全ての専門家グループの代表者が加わっている。",
  5: "対象集団(患者、一般市民など)の価値観や希望が調べられた。",
  6: "対象となるガイドラインの利用者が明確に定義されている。",
  7: "エビデンスを検索するために系統的な方法が用いられている。",
  8: "エビデンスの選択基準が明確に記載されている。",
  9: "エビデンス総体(body of evidence)の強さと限界が明確に記載されている。",
  10: "推奨を作成する方法が明確に記載されている。",
  11: "推奨の作成にあたって、健康上の益、副作用、リスクが考慮されている。",
  12: "推奨とそれを支持するエビデンスとの対応関係が明確である。",
  13: "ガイドラインの公表に先立って、専門家による外部評価がなされている。",
  14: "ガイドラインの改訂手続きが示されている。",
  15: "推奨が具体的であり、曖昧でない。",
  16: "患者の状態や健康上の問題に応じて、異なる選択肢が明確に示されている。",
  17: "重要な推奨が容易に見つけられる。",
  18: "ガイドラインの適用にあたっての促進要因と阻害要因が記載されている。",
  19: "どのように推奨を適用するかについての助言・ツールを提供している。",
  20: "推奨の適用に対する潜在的な資源の影響が考慮されている。",
  21: "ガイドラインにモニタリングや監査のための基準が示されている。",
  22: "資金提供者の見解が、ガイドラインの内容に影響していない。",
  23: "ガイドライン作成グループメンバーの利益相反が記録され、適切な対応がなされている。"
};

var chartInstance = null;

function loadDashboard() {
  document.getElementById('loadingMsg').style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('pdfArea').style.display = 'none';

  fetch(API_URL + '?action=all')
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (!data.ok) throw new Error(data.error || 'load failed');
      render(data.config, data.responses);
    })
    .catch(function (err) {
      document.getElementById('loadingMsg').style.display = 'none';
      var errEl = document.getElementById('errorMsg');
      errEl.style.display = 'block';
      errEl.textContent = 'データの読み込みに失敗しました。API_URLの設定、またはネット接続を確認してください。(' + err + ')';
      console.error(err);
    });
}

function render(config, responses) {
  document.getElementById('guidelineLine').textContent =
    '評価対象ガイドライン: ' + (config.guidelineName || '(未設定)') + ' / 班数: ' + config.groupCount;

  document.getElementById('loadingMsg').style.display = 'none';
  document.getElementById('pdfArea').style.display = 'block';

  renderOverallTable(responses);
  var confirmedResponses = responses.filter(function (r) { return r['ステータス'] === '確定'; });
  var domainScoresByGroup = responses.map(function (r) { return { group: r['班'], status: r['ステータス'], scores: computeDomainScores([r]) }; });
  var combinedScores = computeDomainScores(confirmedResponses);

  renderDomainChart(domainScoresByGroup, combinedScores);
  renderDomainTable(domainScoresByGroup, combinedScores);
  renderComments(responses);
}

/**
 * 指定した回答行のうち、評点(スコア)が未入力の項目番号(1〜23)の配列を返す。
 */
function getMissingItemNumbers(r) {
  var missing = [];
  for (var i = 1; i <= 23; i++) {
    var v = r['項目' + i + '_評点'];
    if (v === '' || v === undefined || v === null) missing.push(i);
  }
  return missing;
}

function isOverallQualityMissing(r) {
  var v = r['全体評価_質'];
  return v === '' || v === undefined || v === null;
}

function isOverallRecommendMissing(r) {
  var v = r['全体評価_推奨'];
  return v === '' || v === undefined || v === null;
}

function renderOverallTable(responses) {
  var tbody = document.querySelector('#overallTable tbody');
  tbody.innerHTML = '';
  if (responses.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5">まだ回答がありません。</td></tr>';
    return;
  }
  responses.forEach(function (r) {
    var tr = document.createElement('tr');
    var statusClass = r['ステータス'] === '確定' ? 'status-confirmed' : 'status-draft';
    var missing = getMissingItemNumbers(r);
    var missingLabels = missing.map(function (n) { return '項目' + n; });
    if (isOverallQualityMissing(r)) missingLabels.push('全体の質');
    if (isOverallRecommendMissing(r)) missingLabels.push('使用の推奨');
    var missingCell = missingLabels.length === 0
      ? '<span class="status-ok">なし</span>'
      : '<span class="status-badge status-missing" title="' + missingLabels.join(', ') + '">未回答 ' + missingLabels.length + '件</span>';
    tr.innerHTML =
      '<td class="group-col">' + escapeHtml(r['班']) + '班</td>' +
      '<td><span class="status-badge ' + statusClass + '">' + escapeHtml(r['ステータス'] || '未回答') + '</span></td>' +
      '<td>' + escapeHtml(r['全体評価_質']) + '</td>' +
      '<td>' + escapeHtml(r['全体評価_推奨']) + '</td>' +
      '<td>' + missingCell + '</td>';
    tbody.appendChild(tr);
  });
}

/**
 * responsesSubset: 対象とする回答行の配列(通常は「確定」のみ、または単一班)
 * 戻り値: ドメイン名をキーに、パーセントスコアを持つオブジェクト
 */
function computeDomainScores(responsesSubset) {
  var result = {};
  DOMAIN_DEFS.forEach(function (domain) {
    var n = responsesSubset.length;
    if (n === 0) {
      result[domain.name] = null;
      return;
    }
    var itemCount = domain.items.length;
    var sum = 0;
    var validRaterCount = 0;
    responsesSubset.forEach(function (r) {
      var raterSum = 0;
      var raterHasAll = true;
      domain.items.forEach(function (itemN) {
        var v = r['項目' + itemN + '_評点'];
        if (v === '' || v === undefined || v === null) {
          raterHasAll = false;
        } else {
          raterSum += Number(v);
        }
      });
      if (raterHasAll) {
        sum += raterSum;
        validRaterCount++;
      }
    });
    if (validRaterCount === 0) {
      result[domain.name] = null;
      return;
    }
    var maxScore = 7 * itemCount * validRaterCount;
    var minScore = 1 * itemCount * validRaterCount;
    var pct = ((sum - minScore) / (maxScore - minScore)) * 100;
    result[domain.name] = Math.round(pct * 10) / 10;
  });
  return result;
}

// 班ごとに見分けやすいよう、色に加えて点の形も変える(最大4班分)
var POINT_STYLES = ['circle', 'rectRot', 'triangle', 'rectRounded'];

function renderDomainChart(domainScoresByGroup, combinedScores) {
  var ctx = document.getElementById('domainChart').getContext('2d');
  var labels = DOMAIN_DEFS.map(function (d) { return d.name; });

  // 各班は「点のみ」で表示する(線でつないだ図形にすると4つ重なって見づらいため)
  var datasets = domainScoresByGroup.map(function (g, idx) {
    var color = colorForIndex(idx, 1);
    return {
      label: g.group + '班' + (g.status === '確定' ? '' : '(下書き)'),
      data: labels.map(function (l) { return g.scores[l]; }),
      showLine: false,
      fill: false,
      pointStyle: POINT_STYLES[idx % POINT_STYLES.length],
      pointBackgroundColor: color,
      pointBorderColor: '#fff',
      pointBorderWidth: 1.5,
      pointRadius: g.status === '確定' ? 7 : 5,
      pointHoverRadius: 9
    };
  });

  // 合計(確定済み班)だけを、塗りつぶした図形として表示する
  datasets.push({
    label: '合計(確定済み班)',
    data: labels.map(function (l) { return combinedScores[l]; }),
    backgroundColor: 'rgba(44,95,138,0.25)',
    borderColor: '#2c5f8a',
    borderWidth: 3,
    pointBackgroundColor: '#2c5f8a',
    pointRadius: 4,
    order: 1
  });

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'radar',
    data: { labels: labels, datasets: datasets },
    options: {
      responsive: true,
      plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, boxHeight: 8 } } },
      scales: {
        r: {
          angleLines: { color: 'rgba(216,222,229,0.8)' },
          grid: { color: 'rgba(216,222,229,0.8)' },
          pointLabels: { font: { size: 11 }, color: '#444' },
          suggestedMin: 0,
          suggestedMax: 100,
          ticks: { stepSize: 20, backdropColor: 'transparent', color: '#999' }
        }
      }
    }
  });
}

function renderDomainTable(domainScoresByGroup, combinedScores) {
  var head = document.getElementById('domainTableHead');
  head.innerHTML = '<th class="group-col">班</th>' + DOMAIN_DEFS.map(function (d) { return '<th>' + d.name.replace('領域', '') + '</th>'; }).join('');

  var body = document.getElementById('domainTableBody');
  body.innerHTML = '';

  domainScoresByGroup.forEach(function (g) {
    var tr = document.createElement('tr');
    var cells = '<td class="group-col">' + escapeHtml(g.group) + '班</td>';
    DOMAIN_DEFS.forEach(function (d) {
      var v = g.scores[d.name];
      cells += '<td>' + (v === null ? '-' : v + '%') + '</td>';
    });
    tr.innerHTML = cells;
    body.appendChild(tr);
  });

  var trCombined = document.createElement('tr');
  trCombined.style.fontWeight = 'bold';
  var combinedCells = '<td class="group-col">合計(確定済み)</td>';
  DOMAIN_DEFS.forEach(function (d) {
    var v = combinedScores[d.name];
    combinedCells += '<td>' + (v === null ? '-' : v + '%') + '</td>';
  });
  trCombined.innerHTML = combinedCells;
  body.appendChild(trCombined);
}

/**
 * 項目(1〜23)ごとに、各班の評点とコメントをアコーディオンで表示する。
 */
function renderComments(responses) {
  var container = document.getElementById('commentsContainer');
  container.innerHTML = '';

  if (responses.length === 0) {
    container.innerHTML = '<p class="no-comment">まだ回答がありません。</p>';
    return;
  }

  // 全体評価(使用の推奨)についてのコメントを、項目一覧の先頭にまとめて表示する
  var recommendHeading = document.createElement('div');
  recommendHeading.style.fontWeight = 'bold';
  recommendHeading.style.color = 'var(--main-color)';
  recommendHeading.style.margin = '0 0 6px';
  recommendHeading.textContent = 'ガイドラインの全体評価';
  container.appendChild(recommendHeading);

  var rowsWithRecommendComment = responses.filter(function (r) {
    var c = r['全体評価_推奨コメント'];
    return c && String(c).trim() !== '';
  });

  var missingRecommendGroups = responses.filter(isOverallRecommendMissing);
  var missingRecommendHtml = missingRecommendGroups.length > 0
    ? ' ・ <span class="status-badge status-missing">未回答: ' + missingRecommendGroups.map(function (r) { return escapeHtml(r['班']) + '班'; }).join(', ') + '</span>'
    : '';

  var recommendItem = document.createElement('div');
  recommendItem.className = 'accordion-item';
  var recommendHeader = document.createElement('button');
  recommendHeader.className = 'accordion-header';
  recommendHeader.type = 'button';
  recommendHeader.innerHTML =
    '<span><span class="num">総合</span>2. このガイドラインの使用を推奨する。</span>' +
    '<span class="meta">コメント ' + rowsWithRecommendComment.length + '件' + missingRecommendHtml + ' <span class="accordion-arrow">▾</span></span>';
  recommendHeader.addEventListener('click', function () {
    recommendItem.classList.toggle('open');
  });
  var recommendBody = document.createElement('div');
  recommendBody.className = 'accordion-body';
  if (rowsWithRecommendComment.length === 0) {
    recommendBody.innerHTML = '<p class="no-comment">コメントは記入されていません。</p>';
  } else {
    rowsWithRecommendComment.forEach(function (r) {
      var row = document.createElement('div');
      row.className = 'comment-row';
      row.innerHTML =
        '<div class="who"><span class="score-badge">' + escapeHtml(r['全体評価_推奨']) + '</span>' + escapeHtml(r['班']) + '班</div>' +
        '<p>' + escapeHtml(r['全体評価_推奨コメント']) + '</p>';
      recommendBody.appendChild(row);
    });
  }
  recommendItem.appendChild(recommendHeader);
  recommendItem.appendChild(recommendBody);
  container.appendChild(recommendItem);

  DOMAIN_DEFS.forEach(function (domain) {
    var domainHeading = document.createElement('div');
    domainHeading.style.fontWeight = 'bold';
    domainHeading.style.color = 'var(--main-color)';
    domainHeading.style.margin = '14px 0 6px';
    domainHeading.textContent = domain.name;
    container.appendChild(domainHeading);

    domain.items.forEach(function (itemN) {
      var rowsWithComment = responses.filter(function (r) {
        var c = r['項目' + itemN + '_コメント'];
        return c && String(c).trim() !== '';
      });
      var scores = responses
        .map(function (r) { return r['項目' + itemN + '_評点']; })
        .filter(function (v) { return v !== '' && v !== undefined && v !== null; })
        .map(Number);
      var avg = scores.length ? (scores.reduce(function (a, b) { return a + b; }, 0) / scores.length).toFixed(1) : '-';
      var missingGroups = responses.filter(function (r) {
        var v = r['項目' + itemN + '_評点'];
        return v === '' || v === undefined || v === null;
      });

      var item = document.createElement('div');
      item.className = 'accordion-item';

      var missingHtml = missingGroups.length > 0
        ? ' ・ <span class="status-badge status-missing">未回答: ' + missingGroups.map(function (r) { return escapeHtml(r['班']) + '班'; }).join(', ') + '</span>'
        : '';

      var header = document.createElement('button');
      header.className = 'accordion-header';
      header.type = 'button';
      header.innerHTML =
        '<span><span class="num">項目' + itemN + '</span>' + escapeHtml(ITEM_TEXTS[itemN]) + '</span>' +
        '<span class="meta">平均評点 ' + avg + '/7 ・ コメント ' + rowsWithComment.length + '件' + missingHtml + ' <span class="accordion-arrow">▾</span></span>';
      header.addEventListener('click', function () {
        item.classList.toggle('open');
      });

      var body = document.createElement('div');
      body.className = 'accordion-body';
      if (rowsWithComment.length === 0) {
        body.innerHTML = '<p class="no-comment">コメントは記入されていません。</p>';
      } else {
        rowsWithComment.forEach(function (r) {
          var row = document.createElement('div');
          row.className = 'comment-row';
          var score = r['項目' + itemN + '_評点'];
          row.innerHTML =
            '<div class="who"><span class="score-badge">' + escapeHtml(score) + '/7</span>' + escapeHtml(r['班']) + '班</div>' +
            '<p>' + escapeHtml(r['項目' + itemN + '_コメント']) + '</p>';
          body.appendChild(row);
        });
      }

      item.appendChild(header);
      item.appendChild(body);
      container.appendChild(item);
    });
  });
}

function colorForIndex(idx, alpha) {
  var palette = [
    [231, 122, 31], [76, 149, 108], [155, 89, 182], [52, 152, 219]
  ];
  var c = palette[idx % palette.length];
  return 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + alpha + ')';
}

function escapeHtml(v) {
  if (v === undefined || v === null) return '';
  return String(v).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

document.getElementById('reloadBtn').addEventListener('click', loadDashboard);

document.getElementById('expandAllBtn').addEventListener('click', function () {
  document.querySelectorAll('#commentsContainer .accordion-item').forEach(function (el) { el.classList.add('open'); });
});
document.getElementById('collapseAllBtn').addEventListener('click', function () {
  document.querySelectorAll('#commentsContainer .accordion-item').forEach(function (el) { el.classList.remove('open'); });
});

document.getElementById('pdfBtn').addEventListener('click', function () {
  var btn = this;
  btn.disabled = true;
  btn.textContent = 'PDF作成中...';
  var target = document.getElementById('pdfArea');

  // コメントのアコーディオンが閉じたままだとPDFに文章が写らないため、
  // 撮影前に一旦すべて開き、撮影後に元の開閉状態へ戻す。
  var accordionItems = document.querySelectorAll('#commentsContainer .accordion-item');
  var previouslyOpen = [];
  accordionItems.forEach(function (el) {
    previouslyOpen.push(el.classList.contains('open'));
    el.classList.add('open');
  });

  html2canvas(target, { scale: 2 }).then(function (canvas) {
    var imgData = canvas.toDataURL('image/png');
    var jsPDFLib = window.jspdf.jsPDF;
    var pdfWidth = 210; // A4 mm
    var pdfHeight = (canvas.height * pdfWidth) / canvas.width;
    var pdf = new jsPDFLib({ orientation: 'p', unit: 'mm', format: [pdfWidth, pdfHeight] });
    pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
    var dateStr = new Date().toISOString().slice(0, 10);
    pdf.save('AGREEⅡ評価結果_' + dateStr + '.pdf');
  }).catch(function (err) {
    alert('PDFの作成に失敗しました: ' + err);
    console.error(err);
  }).finally(function () {
    accordionItems.forEach(function (el, i) {
      if (!previouslyOpen[i]) el.classList.remove('open');
    });
    btn.disabled = false;
    btn.textContent = 'PDFで保存';
  });
});

loadDashboard();
</script>
